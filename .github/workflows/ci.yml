name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check src

      - name: Run pytest
        run: python -m pytest

      - name: Set temporary Git identity for CI audit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run public safety audit
        run: python -m project_pulse public-audit

      - name: Smoke test scan command
        run: python -m project_pulse scan --json --root .

      - name: Smoke test session commands
        run: |
          python -m project_pulse session-record --workspace .
          python -m project_pulse session-list --workspace .

      - name: Smoke test Codex integration commands
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          @'
          watched_root = "."
          lookback_window_hours = 24
          minimum_recent_files = 4
          minimum_recent_code_files = 2
          minimum_workspaces_with_activity = 1
          minimum_activity_score = 12
          maximum_reported_files = 12
          require_git_signal = false
          expose_absolute_paths_in_reports = false
          high_signal_extensions = [".py"]
          ignored_directory_names = [".git", "__pycache__", ".pytest_cache", ".ruff_cache"]
          low_signal_directory_names = []
          ignored_file_names = []
          project_marker_names = ["pyproject.toml", ".git"]
          [weights]
          recent_file = 1
          recent_code_file = 3
          repository_with_uncommitted_changes = 4
          repository_with_recent_commit = 5
          [publisher]
          enabled = false
          target_repo_path = ""
          mirror_subdirectory = "workspace"
          commit_message_prefix = "pulse"
          push_after_commit = false
          require_explicit_push = true
          exclude_globs = []
          [session_persistence]
          enabled = true
          store_path = ".project-pulse-state/ci-sessions.json"
          session_gap_minutes = 90
          max_sessions_per_workspace = 25
          [codex_integration]
          enabled = true
          workspace = "."
          process_names = ["python.exe"]
          poll_seconds = 20
          state_path = ".project-pulse-state/ci-codex-state.json"
          '@ | Set-Content -Path codex-ci.toml
          python -m project_pulse codex-record-open --config codex-ci.toml
          python -m project_pulse codex-watch --config codex-ci.toml --max-polls 0

      - name: Verify source compiles
        run: python -m compileall src

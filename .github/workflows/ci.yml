name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package and dev tools
        run: python -m pip install -e .[dev]

      - name: Run Ruff
        run: python -m ruff check src tests

      - name: Run pytest
        run: python -m pytest

      - name: Set temporary Git identity for CI audit
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run safety audit
        run: python -m project_pulse safety-audit

      - name: Smoke test scan command
        run: python -m project_pulse scan --json --root .

      - name: Smoke test session commands
        run: |
          python -m project_pulse session-record --workspace .
          python -m project_pulse session-list --workspace .

      - name: Verify source compiles
        run: python -m compileall src
